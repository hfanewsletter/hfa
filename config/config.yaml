# LLM Configuration
# To switch providers, change 'provider' and update LLM_API_KEY in .env
llm:
  provider: gemini # Options: gemini, openai
  model: gemini-2.5-flash # Used for article extraction and summarization
  embedding_model: gemini-embedding-001 # Used for duplicate detection. Alternative: gemini-embedding-2-preview (multimodal, preview)

# Storage Configuration
# To switch to cloud storage, change 'provider' and add relevant credentials to .env
storage:
  provider: local # Options: local, s3, azure, gcs
  inbox_path: ./inbox
  processed_path: ./processed
  editorial_inbox_path: ./editorial_inbox

# Email Configuration
email:
  # Sender address — must be on a verified Resend domain
  # API key comes from RESEND_API_KEY in .env
  subscribers:
    - tableaulancer@gmail.com
    - curiousmindshex@gmail.com
  # Digest email subject/header title and newspaper branding
  title: "The American Express Times"
  newspaper_name: "The American Express Times"
  # Subscribe/unsubscribe page URLs — update these once the website is live
  subscribe_url: "https://hfa-hn9w.onrender.com/newsletter"
  unsubscribe_url: "https://hfa-hn9w.onrender.com/newsletter"
  # send_immediately: true sends email right after processing
  # Set to false for production and configure a cron schedule
  send_immediately: true
  # Used when send_immediately is false:
  schedule_cron: "0 8 * * *" # 8 AM daily

# Website Configuration
website:
  # Base URL used for "Read Full Article" links in the email.
  # Override with WEBSITE_BASE_URL env var in production.
  base_url: "http://localhost:3000"

# Rewriter Configuration
rewriter:
  # Cosine similarity threshold for grouping same-story articles across newspapers.
  # Lower = more aggressive grouping (0.70-0.85 recommended).
  grouping_threshold: 0.80

# Deduplication Configuration
deduplication:
  # Cosine similarity threshold for cross-run duplicate detection (0-1).
  # Articles above this are considered already-published duplicates and skipped.
  similarity_threshold: 0.85

# Processing Safeguards
processing:
  # Articles from newspapers older than this many days are saved to the archive
  # but excluded from the email digest. Set to 0 to disable.
  max_newspaper_age_days: 3

# Logging
logging:
  level: INFO
  log_file: ./logs/app.log
